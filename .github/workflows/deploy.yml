name: gitops-deploy

on:
  push:
    branches:
      - '**'

env:
  GITOPS_REPO: erchetansoni/argocd-demo-gitops
  BASE_DOMAIN: chetan.com

jobs:
  render-and-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve and validate branch
        id: branch
        run: |
          BRANCH="${GITHUB_REF_NAME}"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
          if [[ "$BRANCH" == *"/"* ]]; then
            echo "Branch '$BRANCH' contains '/', skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Map branch -> environment / namespace / host prefix
        if: steps.branch.outputs.skip == 'false'
        id: map
        run: |
          BRANCH="${{ steps.branch.outputs.branch }}"
          case "$BRANCH" in
            main)  ENV=production            ; HOST_PREFIX="" ;;
            dev)   ENV=development           ; HOST_PREFIX=".${BRANCH}" ;;
            stage) ENV=stage                 ; HOST_PREFIX=".${BRANCH}" ;;
            it)    ENV=information-technology; HOST_PREFIX=".${BRANCH}" ;;
            *)     ENV="$BRANCH"             ; HOST_PREFIX=".${BRANCH}" ;;
          esac
          echo "env=$ENV"                 >> "$GITHUB_OUTPUT"
          echo "namespace=$BRANCH"        >> "$GITHUB_OUTPUT"
          echo "host_prefix=$HOST_PREFIX" >> "$GITHUB_OUTPUT"

      - name: Checkout source repo (templates)
        if: steps.branch.outputs.skip == 'false'
        uses: actions/checkout@v4
        with:
          path: source

      - name: Checkout GitOps repo (with submodule)
        if: steps.branch.outputs.skip == 'false'
        uses: actions/checkout@v4
        with:
          repository: ${{ env.GITOPS_REPO }}
          token: ${{ secrets.GITOPS_TOKEN }}
          path: gitops
          submodules: true

      - name: Bump _source submodule to this commit
        if: steps.branch.outputs.skip == 'false'
        working-directory: gitops/_source
        run: |
          git fetch origin "${GITHUB_SHA}"
          git checkout "${GITHUB_SHA}"

      - name: Render environment folder
        if: steps.branch.outputs.skip == 'false'
        env:
          BRANCH:      ${{ steps.branch.outputs.branch }}
          ENVIRONMENT: ${{ steps.map.outputs.env }}
          NAMESPACE:   ${{ steps.map.outputs.namespace }}
          HOST_PREFIX: ${{ steps.map.outputs.host_prefix }}
          BASE_DOMAIN: ${{ env.BASE_DOMAIN }}
          IMAGE_TAG:   ${{ github.sha }}
        run: |
          chmod +x source/.github/scripts/render-env.sh
          source/.github/scripts/render-env.sh \
            source/.github/templates \
            gitops/environments/${BRANCH}

      - name: Commit & push to GitOps repo
        if: steps.branch.outputs.skip == 'false'
        working-directory: gitops
        run: |
          git config user.name  "gitops-bot"
          git config user.email "gitops-bot@users.noreply.github.com"
          git add environments/${{ steps.branch.outputs.branch }} _source
          if git diff --cached --quiet; then
            echo "No changes — nothing to commit."
            exit 0
          fi
          git commit -m "ci(${{ steps.branch.outputs.branch }}): sync from ${GITHUB_SHA::7} [skip ci]"
          git push origin HEAD:main
