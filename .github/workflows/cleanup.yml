name: gitops-cleanup

on:
  delete:

env:
  GITOPS_REPO: erchetansoni/argocd-demo-gitops

jobs:
  remove-environment:
    if: github.event.ref_type == 'branch'
    runs-on: ubuntu-latest
    steps:
      - name: Resolve and validate deleted branch
        id: branch
        run: |
          BRANCH="${{ github.event.ref }}"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"

          if [[ "$BRANCH" == *"/"* ]]; then
            echo "Deleted branch '$BRANCH' contains '/', skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [[ "$BRANCH" == "main" ]]; then
            echo "Refusing to wipe environments/main from a delete event."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Checkout GitOps repo
        if: steps.branch.outputs.skip == 'false'
        uses: actions/checkout@v4
        with:
          repository: ${{ env.GITOPS_REPO }}
          token: ${{ secrets.GITOPS_TOKEN }}
          path: gitops

      - name: Remove environments/${{ steps.branch.outputs.branch }} and push
        if: steps.branch.outputs.skip == 'false'
        working-directory: gitops
        run: |
          BRANCH="${{ steps.branch.outputs.branch }}"
          if [ ! -d "environments/${BRANCH}" ]; then
            echo "environments/${BRANCH} does not exist — nothing to clean up."
            exit 0
          fi

          git config user.name  "gitops-bot"
          git config user.email "gitops-bot@users.noreply.github.com"
          git rm -r "environments/${BRANCH}"
          git commit -m "ci(${BRANCH}): teardown — branch deleted [skip ci]"
          git push origin HEAD:main
