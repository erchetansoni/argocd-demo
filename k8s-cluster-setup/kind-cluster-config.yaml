kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: gitops-demo-cluster
nodes:
  - role: control-plane
    image: kindest/node:v1.35.0
    extraPortMappings:
      - containerPort: 80
        hostPort: 80
        protocol: TCP
      - containerPort: 443
        hostPort: 443
        protocol: TCP
