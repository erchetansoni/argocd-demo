apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: app3
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/erchetansoni/GitOps-ArgoCD-demo.git
    targetRevision: HEAD
    path: apps/app3
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: app3
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
