apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: app1-external-secret-file
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: app1-aws-secretsmanager
    kind: SecretStore
  target:
    name: app1-secret-file
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: argocd-demo/app-secret-file
