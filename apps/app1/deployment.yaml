apiVersion: apps/v1
kind: Deployment
metadata:
  name: app1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: app1
  template:
    metadata:
      labels:
        app: app1
    spec:
      containers:
        - name: app1
          image: jmutai/kuard-amd64:latest

          ports:
            - containerPort: 8080

          envFrom:
            - configMapRef:
                name: app1-config-env

          volumeMounts:
            - name: scripts-volume
              mountPath: /scripts

          resources:
            requests:
              memory: "64Mi"
              cpu: "256m"
            limits:
              memory: "128Mi"
              cpu: "512m"

      volumes:
        - name: scripts-volume
          configMap:
            name: app1-config-file
            defaultMode: 0755
