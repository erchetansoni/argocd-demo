apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app: {{ .Release.Name }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Chart.Name }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        app: {{ .Release.Name }}
    spec:
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.containerPort }}
          envFrom:
            - configMapRef:
                name: {{ .Release.Name }}-config-env
            - secretRef:
                name: {{ .Values.externalSecrets.env.targetSecretName }}
          volumeMounts:
            - name: scripts-volume
              mountPath: {{ .Values.volumes.scriptsMountPath }}
            - name: aws-secret-file-volume
              mountPath: {{ .Values.volumes.awsSecretFileMountPath }}
              readOnly: true
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: scripts-volume
          configMap:
            name: {{ .Release.Name }}-config-file
            defaultMode: {{ .Values.volumes.defaultMode }}
        - name: aws-secret-file-volume
          secret:
            secretName: {{ .Values.externalSecrets.file.targetSecretName }}
            defaultMode: {{ .Values.volumes.defaultMode }}
